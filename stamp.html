<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>スタンプ獲得</title>
</head>
<body>
  <h2 id="status">スタンプ獲得中...</h2>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAxesRcqeqRsL2qQ2zMHcQLBS5e4emTF-g",
      authDomain: "stamp-50bf1.firebaseapp.com",
      projectId: "stamp-50bf1",
      storageBucket: "stamp-50bf1.firebasestorage.app",
      messagingSenderId: "618539694181",
      appId: "1:618539694181:web:bf97371ca424d67cc5eae8c",
      measurementId: "G-NPVD4BBHRD"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ★★★ ユーザーごとに userId を自動生成（index.html と同じ） ★★★
    let userId = localStorage.getItem("userId");
    if (!userId) {
      userId = crypto.randomUUID();   // 初回アクセス時に一意のIDを発行
      localStorage.setItem("userId", userId);
    }

    // URL から spot を取得
    const params = new URLSearchParams(window.location.search);
    const spot = params.get("spot");

    // Firestore の保存先（ユーザーごとに分かれる）
    const ref = doc(db, "users", userId, "stamps", spot);

    // Firestore に保存
    setDoc(ref, {
      acquired: true,
      time: new Date()
    })
    .then(() => {
      document.getElementById("status").innerText =
        `スタンプ「${spot}」を獲得しました！`;

      // 3秒後に一覧へ戻る
      setTimeout(() => {
        window.location.href = "index.html";
      }, 3000);
    })
    .catch((error) => {
      document.getElementById("status").innerText =
        "スタンプ獲得に失敗しました…";
      console.error(error);
    });
  </script>
</body>
</html>
