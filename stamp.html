<!DOCTYPE html>
<html>
<body>
<h2>スタンプ獲得中...</h2>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAxesRcqeqRsL2qQ2zMHcQLBS5e4emTF-g",
  authDomain: "stamp-50bf1.firebaseapp.com",
  projectId: "stamp-50bf1",
  storageBucket: "stamp-50bf1.firebasestorage.app",
  messagingSenderId: "618539694181",
  appId: "1:618539694181:web:bf97371ca424d67cc5eae8c",
  measurementId: "G-NPVD4BBHRD"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// URLからspot ID取得
const params = new URLSearchParams(window.location.search);
const spot = params.get("spot");

// 仮ユーザーID（ログイン不要版）
const userId = "test_user";

// Firestoreに保存
async function addStamp() {
  const ref = doc(db, "users", userId);
  const snap = await getDoc(ref);

  let stamps = [];
  if (snap.exists()) {
    stamps = snap.data().stamps || [];
  }

  if (!stamps.includes(spot)) {
    stamps.push(spot);
  }

  await setDoc(ref, { stamps });

  document.body.innerHTML = `<h2>「${spot}」のスタンプを獲得しました！</h2>
  <a href="index.html">スタンプ一覧へ戻る</a>`;
}

addStamp();
</script>
</body>
</html>
