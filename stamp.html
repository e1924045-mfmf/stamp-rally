<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>スタンプ獲得</title>
</head>
<body>
  <h2 id="status">スタンプ獲得中...</h2>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAxesRcqeqRsL2qQ2zMHcQLBS5e4emTF-g",
      authDomain: "stamp-50bf1.firebaseapp.com",
      projectId: "stamp-50bf1",
      storageBucket: "stamp-50bf1.firebasestorage.app",
      messagingSenderId: "618539694181",
      appId: "1:618539694181:web:bf97371ca424d67cc5eae8c",
      measurementId: "G-NPVD4BBHRD"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth();

    async function main() {
      // ★ 匿名ログイン（ここで await する）
      await signInAnonymously(auth);
      const userId = auth.currentUser.uid;

      const params = new URLSearchParams(window.location.search);
      const spot = params.get("spot");

      const ref = doc(db, "users", userId, "stamps", spot);

      try {
        await setDoc(ref, {
          acquired: true,
          time: new Date()
        });

        document.getElementById("status").innerText =
          `スタンプ「${spot}」を獲得しました！`;

        setTimeout(() => {
          window.location.href = "index.html";
        }, 3000);

      } catch (error) {
        document.getElementById("status").innerText =
          "スタンプ獲得に失敗しました…";
        console.error(error);
      }
    }

    main();
  </script>
</body>
</html>
