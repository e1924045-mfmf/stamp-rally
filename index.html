<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>スタンプ一覧</title>
</head>
<body>
  <h2>スタンプ一覧</h2>
  <div id="list">読み込み中...</div>

  <!-- Firebase SDK v9 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // ★★★ あなたの Firebase 設定 ★★★
    const firebaseConfig = {
      apiKey: "AIzaSyAxesRcqeqRsL2qQ2zMHcQLBS5e4emTF-g",
      authDomain: "stamp-50bf1.firebaseapp.com",
      projectId: "stamp-50bf1",
      storageBucket: "stamp-50bf1.firebasestorage.app",
      messagingSenderId: "618539694181",
      appId: "1:618539694181:web:bf97371ca424d67cc5eae8c",
      measurementId: "G-NPVD4BBHRD"
    };

    // Firebase 初期化
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 仮ユーザーID（stamp.html と合わせてある）
    const userId = "test-user";

    // 表示するスポット一覧
    const spots = ["spot1", "spot2", "spot3"];

    async function loadStamps() {
      const listDiv = document.getElementById("list");
      let html = "";

      for (const spot of spots) {
        const ref = doc(db, "users", userId, "stamps", spot);
        const snap = await getDoc(ref);

        const got = snap.exists(); // 獲得済みかどうか

        html += `<p>${spot}：${got ? "🟢獲得済み" : "⚪未獲得"}</p>`;
      }

      listDiv.innerHTML = html;
    }

    loadStamps();
  </script>
</body>
</html>
