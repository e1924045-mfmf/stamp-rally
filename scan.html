<!DOCTYPE html>
<html>
<body>
<h2>QRコードを読み取る</h2>
<div id="reader" style="width:300px;"></div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script>
function onScanSuccess(decodedText) {
  window.location.href = decodedText;
}

new Html5QrcodeScanner(
  "reader",
  { fps: 10, qrbox: 250 }
).render(onScanSuccess);
</script>
</body>
</html>
